<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Voice Survey — Create a poll</title>
<style>
  :root { color-scheme: light dark; --bg:#0f1420; --card:#1a2233; --fg:#e8edf6; --mut:#93a1b8; --acc:#6ea8fe; --line:#2a3550; }
  @media (prefers-color-scheme: light){ :root{ --bg:#f4f6fb; --card:#fff; --fg:#16202e; --mut:#5a6b83; --acc:#2f6fed; --line:#e2e8f2; } }
  * { box-sizing: border-box; }
  body { margin:0; font:16px/1.5 system-ui,-apple-system,Segoe UI,Roboto,sans-serif; background:var(--bg); color:var(--fg); }
  .wrap { max-width:640px; margin:0 auto; padding:48px 20px; }
  h1 { font-size:1.7rem; margin:0 0 6px; }
  p.sub { color:var(--mut); margin:0 0 28px; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:14px; padding:24px; }
  label { font-weight:600; display:block; margin:0 0 8px; }
  .presets { display:flex; flex-wrap:wrap; gap:8px; margin:0 0 18px; }
  .chip { border:1px solid var(--line); background:transparent; color:var(--fg); padding:7px 13px; border-radius:999px; cursor:pointer; font-size:.9rem; }
  .chip:hover { border-color:var(--acc); }
  .chip.active { background:var(--acc); border-color:var(--acc); color:#fff; }
  textarea { width:100%; min-height:84px; resize:vertical; padding:12px; border-radius:10px; border:1px solid var(--line); background:var(--bg); color:var(--fg); font:inherit; }
  button.go { margin-top:16px; width:100%; padding:13px; border:0; border-radius:10px; background:var(--acc); color:#fff; font-weight:700; font-size:1rem; cursor:pointer; }
  button.go:disabled { opacity:.6; cursor:default; }
  .result { margin-top:24px; display:none; }
  .result.show { display:block; }
  ol { padding-left:20px; } ol li { margin:6px 0; }
  .linkrow { display:flex; gap:8px; margin-top:14px; }
  .linkrow input { flex:1; padding:10px; border-radius:8px; border:1px solid var(--line); background:var(--bg); color:var(--fg); }
  .linkrow a { padding:10px 14px; border-radius:8px; background:var(--acc); color:#fff; text-decoration:none; font-weight:600; white-space:nowrap; }
  .err { color:#ff6b6b; margin-top:12px; }
  .spin { display:inline-block; width:14px; height:14px; border:2px solid #fff; border-top-color:transparent; border-radius:50%; animation:s .7s linear infinite; vertical-align:-2px; margin-right:8px; }
  @keyframes s { to { transform:rotate(360deg); } }
</style>
</head>
<body>
<div class="wrap">
  <h1>🎙️ Voice Survey</h1>
  <p class="sub">Describe what you sell. We'll generate a few questions and give you a link — respondents answer by talking to a voice agent.</p>

  <div class="card">
    <label>Pick a scenario or describe your own</label>
    <div class="presets" id="presets"></div>
    <textarea id="product" placeholder="e.g. hand-poured scented soy candles for the home"></textarea>
    <label style="margin-top:16px">What's this survey for? <span style="font-weight:400; opacity:.6">(optional — the agent says it out loud)</span></label>
    <input id="purpose" style="width:100%; padding:12px; border-radius:10px; border:1px solid var(--line); background:var(--bg); color:var(--fg); font:inherit;" placeholder="e.g. understand how happy customers are with the scent and burn time">
    <button class="go" id="go" style="margin-top:16px">Generate questions & link</button>
    <div class="err" id="err"></div>

    <div class="result" id="result">
      <label style="margin-top:22px">Generated questions</label>
      <ol id="questions"></ol>
      <label style="margin-top:16px">Share this link with respondents</label>
      <div class="linkrow">
        <input id="link" readonly>
        <a id="open" href="#">Open →</a>
      </div>
      <div class="linkrow" style="margin-top:10px">
        <a id="results" href="#" style="flex:1; text-align:center; background:transparent; color:var(--acc); border:1px solid var(--line);">View results</a>
        <a id="insights" href="#" style="flex:1; text-align:center; background:transparent; color:var(--acc); border:1px solid var(--line);">View scored insights</a>
      </div>
    </div>
  </div>
</div>

<script>
// Scenario presets: each fills the product AND a matching survey goal, so the
// generated questions (and the agent's spoken framing) target the actual use
// case — launching, feature testing, satisfaction, churn, and so on.
const PRESETS = [
  ["Launching a product",
    "hand-poured scented soy candles for the home",
    "gauge first impressions of our newly launched product — what stands out, and whether they'd buy it"],
  ["Testing a new feature",
    "a project-management SaaS app for small teams",
    "learn how our new feature is landing — is it useful, confusing, or missing anything"],
  ["New menu / dishes",
    "a casual farm-to-table restaurant",
    "get honest opinions on the new dishes we just added to the menu"],
  ["Customer satisfaction",
    "a neighborhood specialty coffee shop",
    "measure how satisfied customers are and what would make them come back"],
  ["Churn / cancellation",
    "a subscription meal-kit delivery service",
    "understand why customers are cancelling and what could have kept them"],
  ["Post-event feedback",
    "a two-day industry conference",
    "find out what attendees valued most and what we should change next time"],
];
const presetsEl = document.getElementById("presets");
const productEl = document.getElementById("product");
const purposeEl = document.getElementById("purpose");
PRESETS.forEach(([label, product, purpose]) => {
  const b = document.createElement("button");
  b.className = "chip"; b.textContent = label;
  b.onclick = () => {
    document.querySelectorAll(".chip").forEach(c => c.classList.remove("active"));
    b.classList.add("active");
    productEl.value = product;
    purposeEl.value = purpose || "";
  };
  presetsEl.appendChild(b);
});

const go = document.getElementById("go");
const err = document.getElementById("err");
go.onclick = async () => {
  const product = productEl.value.trim();
  const purpose = purposeEl.value.trim();
  err.textContent = "";
  if (!product) { err.textContent = "Please describe your product first."; return; }
  go.disabled = true;
  go.innerHTML = '<span class="spin"></span>Generating…';
  try {
    const r = await fetch("/api/polls", {
      method: "POST", headers: {"content-type":"application/json"},
      body: JSON.stringify({ product, purpose }),
    });
    if (!r.ok) throw new Error(await r.text() || r.statusText);
    const data = await r.json();
    const ol = document.getElementById("questions");
    ol.innerHTML = "";
    data.questions.forEach(q => { const li = document.createElement("li"); li.textContent = q; ol.appendChild(li); });
    const url = location.origin + data.poll_url;
    document.getElementById("link").value = url;
    document.getElementById("open").href = data.poll_url;
    document.getElementById("results").href = "/results/" + data.id;
    document.getElementById("insights").href = "/insights/" + data.id;
    document.getElementById("result").classList.add("show");
  } catch (e) {
    err.textContent = "Could not generate: " + e.message;
  } finally {
    go.disabled = false;
    go.textContent = "Generate questions & link";
  }
};
</script>
</body>
</html>
